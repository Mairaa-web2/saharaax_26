{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-cover bg-center"
     style="background-image: url('{{ url_for('static', filename='forget.jpg') }}');">

  <div class="bg-white/90 dark:bg-gray-800/90 p-8 rounded-2xl shadow-2xl w-full max-w-md backdrop-blur-sm">
    <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">
      <i class="fas fa-lock"></i> Forgot Password
    </h2>

    <form method="POST" class="space-y-5">
      <!-- Role Selection -->
      <div>
        <label class="block text-sm font-semibold mb-1">Select Role</label>
        <select name="role" required
                class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-400">
          <option value="">-- Select --</option>
          <option value="Counseling">Counselor</option>
        </select>
      </div>

      <!-- Email Input -->
      <div>
        <label class="block text-sm font-semibold mb-1">Email</label>
        <input type="email" name="email" required
               class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-400">
      </div>

      <!-- Submit -->
      <button type="submit"
              class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-2 rounded-lg font-semibold shadow hover:from-blue-700 hover:to-blue-800">
        <i class="fas fa-paper-plane"></i> Send Code
      </button>
    </form>
  </div>
</div>
{% endblock %}
