{% extends "base.html" %}
{% block title %}Success Stories{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-blue-50 via-pink-50 to-blue-100 
            dark:from-gray-900 dark:via-gray-800 dark:to-gray-900">

  <!-- Hero Section -->
  <div class="relative bg-cover bg-center h-80 flex items-center justify-center"
       style="background-image: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1600&q=80');">
    <div class="absolute inset-0 bg-black/50"></div>
    <div class="relative z-10 text-center">
      <h1 class="text-4xl md:text-5xl font-extrabold text-white drop-shadow-lg">
        Inspiring Success Stories
      </h1>
      <p class="text-lg text-gray-200 mt-3">
        Real people. Real change. Real hope. 🌟
      </p>
    </div>
  </div>

  <!-- Stories Grid -->
  <div class="max-w-7xl mx-auto py-12 px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">

    <!-- Story Card Example -->
    {% for story in success_stories %}
    <div class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg rounded-2xl shadow-xl 
                hover:shadow-2xl transition transform hover:-translate-y-2 hover:scale-105 p-6 border-t-4 border-blue-500 relative overflow-hidden">

      <!-- Top Icon -->
      <div class="absolute right-0 top-0 opacity-10 text-blue-400 text-8xl">
        <i class="fas fa-trophy"></i>
      </div>

      <!-- User Info -->
      <div class="flex items-center gap-4 mb-6">
        <img src="{{ url_for('static', filename=story.image) if story.image else url_for('static', filename='default-user.png') }}"
             class="w-16 h-16 rounded-full object-cover shadow-lg border-2 border-blue-500">
        <div>
          <h2 class="text-lg font-bold text-gray-800 dark:text-white">{{ story.name }}</h2>
          <p class="text-sm text-gray-500">{{ story.date }}</p>
        </div>
      </div>

      <!-- Story Content -->
      <blockquote class="italic text-gray-700 dark:text-gray-300 mb-4 border-l-4 border-blue-400 pl-4">
        "{{ story.message }}"
      </blockquote>

      <!-- Footer -->
      <div class="flex justify-between items-center">
        <span class="inline-block text-sm font-semibold text-green-600 dark:text-green-400">
          <i class="fas fa-check-circle mr-1"></i> Achieved Goal
        </span>
        <button class="text-blue-600 hover:text-blue-800 text-sm font-medium transition">
          <i class="fas fa-share-alt mr-1"></i> Share
        </button>
      </div>
    </div>
    {% endfor %}

  </div>
</div>
{% endblock %}
