{% extends "base_admin.html" %}
{% block title %}Add Course{% endblock %}
{% block header %}Add Technical Training Course{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white dark:bg-gray-800 p-6 rounded-lg shadow-lg">
  <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">➕ Add New Course</h2>

  <form method="POST" class="space-y-4">

    <!-- Course Title -->
    <div>
      <label class="block mb-1 font-semibold">Course Title</label>
      <input type="text"
             name="title"
             class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500"
             required>
    </div>

    <!-- Category as Dropdown -->
    <div>
      <label class="block mb-1 font-semibold">Category</label>
      <select name="category"
              class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 bg-white dark:bg-gray-800"
              required>
        <option value="" disabled selected>-- Select Category --</option>
        <option value="Kitchen / Cooking Skills">Kitchen / Cooking Skills</option>
        <option value="Home Cleaning & Maintenance">Home Cleaning & Maintenance</option>
        <option value="Child Care & Parenting">Child Care & Parenting</option>
        <option value="Elderly Care">Elderly Care</option>
        <option value="Sewing & Tailoring">Sewing & Tailoring</option>
        <option value="Basic Home Safety">Basic Home Safety</option>
      </select>
    </div>

    <!-- Number of Lectures -->
    <div>
      <label class="block mb-1 font-semibold">Number of Lectures</label>
      <input type="number"
             id="lectureCount"
             name="lecture_count"
             min="1"
             max="50"
             class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500"
             required>
    </div>

    <!-- Dynamic Lecture Link Inputs -->
    <div id="lectureInputs" class="space-y-3"></div>

    <!-- Submit -->
    <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg shadow transition">
      Add Course
    </button>
  </form>
</div>

<script>
  const countInput = document.getElementById('lectureCount');
  const lectureInputsDiv = document.getElementById('lectureInputs');

  countInput.addEventListener('input', () => {
    const count = parseInt(countInput.value) || 0;
    lectureInputsDiv.innerHTML = "";

    for (let i = 1; i <= count; i++) {
      const label = document.createElement('label');
      label.textContent = `Lecture ${i} Link`;
      label.className = "block font-semibold";

      const input = document.createElement('input');
      input.type = "url";
      input.name = `lecture_${i}`;
      input.placeholder = `https://example.com/lecture-${i}`;
      input.required = true;
      input.className = "w-full border p-2 rounded focus:ring-2 focus:ring-blue-500";

      const div = document.createElement('div');
      div.appendChild(label);
      div.appendChild(input);

      lectureInputsDiv.appendChild(div);
    }
  });
</script>
{% endblock %}
