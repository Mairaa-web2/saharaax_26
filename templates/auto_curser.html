<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Cursor Animation Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
            overflow-x: hidden;
            cursor: none;
        }

        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ff00ff;
            box-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff, 0 0 60px #ff00ff;
            transform: translate(-50%, -50%);
            pointer-events: none;
            mix-blend-mode: screen;
            z-index: 9999;
            transition: width 0.3s, height 0.3s;
        }

        .cursor-follower {
            position: fixed;
            width: 60px;
            height: 60px;
            border: 2px solid #00ffff;
            border-radius: 50%;
            box-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
            transform: translate(-50%, -50%);
            pointer-events: none;
            mix-blend-mode: screen;
            z-index: 9998;
            transition: all 0.6s ease;
        }

        .cursor.hover, .cursor-follower.hover {
            width: 30px;
            height: 30px;
            background: #00ffff;
            box-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff, 0 0 60px #00ffff;
        }

        .cursor-follower.hover {
            width: 80px;
            height: 80px;
            border-color: #ff00ff;
            box-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .neon-border {
            position: relative;
            overflow: hidden;
        }

        .neon-border::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            padding: 2px;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: xor;
            mask-composite: exclude;
            animation: neonGlow 3s linear infinite;
            pointer-events: none;
        }

        @keyframes neonGlow {
            0% {
                filter: hue-rotate(0deg) brightness(1.5);
            }
            100% {
                filter: hue-rotate(360deg) brightness(1.5);
            }
        }

        .carousel-container {
            width: 100%;
            max-width: 1400px;
            height: 550px;
            perspective: 2000px;
            margin: 40px auto;
            position: relative;
        }

        .carousel-track {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        .carousel-item {
            position: absolute;
            width: 380px;
            height: 450px;
            left: 50%;
            top: 50%;
            margin-left: -190px;
            margin-top: -225px;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67),
                        z-index 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67),
                        opacity 0.8s ease;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            opacity: 0.6;
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .carousel-item:hover img {
            transform: scale(1.1);
        }

        .carousel-item.active {
            opacity: 1;
            z-index: 10;
            transform: translateZ(0) rotateY(0deg) scale(1.2);
        }

        .carousel-item.prev {
            transform: translateX(-75%) rotateY(30deg) scale(0.9);
            z-index: 3;
        }

        .carousel-item.next {
            transform: translateX(75%) rotateY(-30deg) scale(0.9);
            z-index: 3;
        }

        .carousel-item.far-prev {
            transform: translateX(-150%) rotateY(40deg) scale(0.8);
            z-index: 2;
            opacity: 0.4;
        }

        .carousel-item.far-next {
            transform: translateX(150%) rotateY(-40deg) scale(0.8);
            z-index: 2;
            opacity: 0.4;
        }

        .carousel-item.hidden {
            opacity: 0;
            z-index: 1;
        }

        .carousel-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 25px;
            transform: translateY(100%);
            transition: transform 0.5s ease;
        }

        .carousel-item.active .carousel-caption {
            transform: translateY(0);
        }

        .carousel-nav {
            display: flex;
            justify-content: center;
            margin-top: 30px;
            gap: 15px;
        }

        .carousel-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .carousel-dot.active {
            background: linear-gradient(to right, #ff00ff, #00ffff);
            transform: scale(1.3);
            box-shadow: 0 0 10px #ff00ff, 0 0 20px #00ffff;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            padding: 14px 30px;
            background: linear-gradient(to right, #ff00ff 0%, #00ffff 100%);
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            font-weight: 500;
            box-shadow: 0 5px 15px rgba(255, 0, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: rotate(45deg);
            transition: all 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 0, 255, 0.6);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #ff00ff;
            color: #ff00ff;
            box-shadow: 0 0 10px #ff00ff, inset 0 0 10px rgba(255, 0, 255, 0.1);
        }

        .btn-outline:hover {
            background: rgba(255, 0, 255, 0.1);
            box-shadow: 0 0 20px #ff00ff, inset 0 0 15px rgba(255, 0, 255, 0.2);
        }

        .zoom-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .zoom-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .zoomed-image {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
            transform: scale(0.9);
            transition: transform 0.4s ease;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        .zoom-overlay.active .zoomed-image {
            transform: scale(1);
        }

        .close-zoom {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 30px;
            color: white;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-zoom:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
            box-shadow: 0 0 15px #00ffff;
        }

        .auto-play-toggle {
            display: flex;
            align-items: center;
            margin-top: 25px;
            gap: 15px;
            padding: 15px 25px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 70px;
            height: 34px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.3);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: linear-gradient(to right, #ff00ff, #00ffff);
        }

        input:checked + .slider:before {
            transform: translateX(36px);
        }

        .title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(to right, #ff00ff 0%, #00ffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            text-shadow: 0 5px 15px rgba(255, 0, 255, 0.4);
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from {
                text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff, 0 0 15px #ff00ff, 0 0 20px #ff00ff;
            }
            to {
                text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 30px #ff00ff, 0 0 40px #ff00ff;
            }
        }

        .subtitle {
            font-size: 1.3rem;
            margin-bottom: 40px;
            color: #cbd5e0;
            text-align: center;
            max-width: 700px;
            line-height: 1.6;
        }

        .image-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            z-index: 20;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ff00ff;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
            animation: float 15s linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(720deg);
                opacity: 0;
            }
        }

        .carousel-controls {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            transform: translateY(-50%);
            z-index: 50;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        .control-btn:hover {
            background: rgba(255, 0, 255, 0.2);
            transform: scale(1.1);
            box-shadow: 0 0 20px #ff00ff;
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(to right, #ff00ff, #00ffff);
            width: 0%;
            transition: width 0.3s linear;
            z-index: 20;
        }

        .carousel-item.active .progress-bar {
            width: 100%;
            transition: width 3.5s linear;
        }

        @media (max-width: 1024px) {
            .carousel-container {
                height: 500px;
            }

            .carousel-item {
                width: 340px;
                height: 400px;
                margin-left: -170px;
                margin-top: -200px;
            }
        }

        @media (max-width: 768px) {
            .carousel-container {
                height: 450px;
            }

            .carousel-item {
                width: 300px;
                height: 360px;
                margin-left: -150px;
                margin-top: -180px;
            }

            .title {
                font-size: 2.8rem;
            }

            .controls {
                flex-wrap: wrap;
                justify-content: center;
            }

            .btn {
                padding: 12px 20px;
            }

            body {
                cursor: auto;
            }

            .cursor, .cursor-follower {
                display: none;
            }
        }

        @media (max-width: 640px) {
            .carousel-container {
                height: 400px;
            }

            .carousel-item {
                width: 260px;
                height: 320px;
                margin-left: -130px;
                margin-top: -160px;
            }

            .title {
                font-size: 2.3rem;
            }

            .subtitle {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="cursor"></div>
    <div class="cursor-follower"></div>
    <div class="particles" id="particles"></div>

    <h1 class="title">Neon Cursor Gallery</h1>
    <p class="subtitle">Experience stunning neon effects and cursor animations with this 3D carousel</p>

    <div class="carousel-container glass-card neon-border">
        <div class="carousel-track" id="carouselTrack">
            <!-- Carousel items will be generated by JavaScript -->
        </div>
        <div class="image-counter" id="imageCounter">1/6</div>

        <div class="carousel-controls">
            <div class="control-btn" id="controlPrev">
                <i class="fas fa-chevron-left"></i>
            </div>
            <div class="control-btn" id="controlNext">
                <i class="fas fa-chevron-right"></i>
            </div>
        </div>
    </div>

    <div class="carousel-nav" id="carouselNav">
        <!-- Navigation dots will be generated by JavaScript -->
    </div>

    <div class="controls">
        <button class="btn" id="prevBtn">
            <i class="fas fa-chevron-left"></i> Previous
        </button>
        <button class="btn" id="nextBtn">
            Next <i class="fas fa-chevron-right"></i>
        </button>
        <button class="btn btn-outline" id="addImageBtn">
            <i class="fas fa-plus"></i> Add Image
        </button>
    </div>

    <div class="auto-play-toggle glass-card">
        <span>Auto Play</span>
        <label class="toggle-switch">
            <input type="checkbox" id="autoPlayToggle" checked>
            <span class="slider"></span>
        </label>
        <span>Neon Effects</span>
        <label class="toggle-switch">
            <input type="checkbox" id="neonToggle" checked>
            <span class="slider"></span>
        </label>
    </div>

    <div class="zoom-overlay" id="zoomOverlay">
        <img class="zoomed-image" id="zoomedImage" src="" alt="Zoomed Image">
        <div class="close-zoom">
            <i class="fas fa-times"></i>
        </div>
    </div>

    <script>
        // Image data
        const imageData = [
            {
                url: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1170&q=80",
                title: "Mountain Landscape",
                description: "Beautiful mountain range during sunset"
            },
            {
                url: "https://images.unsplash.com/photo-1519681393784-d120267933ba?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1170&q=80",
                title: "Northern Lights",
                description: "Aurora borealis in the night sky"
            },
            {
                url: "https://images.unsplash.com/photo-1469474968028-56623f02e42e?ixlib=rb-4.0.3&id=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1174&q=80",
                title: "Nature's Beauty",
                description: "Scenic landscape with trees and lake"
            },
            {
                url: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1171&q=80",
                title: "Misty Forest",
                description: "Mysterious fog in the green forest"
            },
            {
                url: "https://images.unsplash.com/photo-1505144808419-1957a94ca61e?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1074&q=80",
                title: "River Flow",
                description: "River flowing through mountain valley"
            },
            {
                url: "https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1170&q=80",
                title: "Rocky Beach",
                description: "Sunset over a rocky beach shoreline"
            }
        ];

        // DOM elements
        const carouselTrack = document.getElementById('carouselTrack');
        const carouselNav = document.getElementById('carouselNav');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const addImageBtn = document.getElementById('addImageBtn');
        const autoPlayToggle = document.getElementById('autoPlayToggle');
        const neonToggle = document.getElementById('neonToggle');
        const zoomOverlay = document.getElementById('zoomOverlay');
        const zoomedImage = document.getElementById('zoomedImage');
        const closeZoom = document.querySelector('.close-zoom');
        const imageCounter = document.getElementById('imageCounter');
        const controlPrev = document.getElementById('controlPrev');
        const controlNext = document.getElementById('controlNext');
        const particlesContainer = document.getElementById('particles');
        const cursor = document.querySelector('.cursor');
        const cursorFollower = document.querySelector('.cursor-follower');

        // State variables
        let currentIndex = 0;
        let autoPlayInterval;
        let isAutoPlay = true;
        let isNeonEnabled = true;

        // Initialize carousel
        function initCarousel() {
            // Clear existing content
            carouselTrack.innerHTML = '';
            carouselNav.innerHTML = '';

            // Create carousel items and navigation dots
            imageData.forEach((image, index) => {
                // Create carousel item
                const item = document.createElement('div');
                item.className = 'carousel-item';
                item.innerHTML = `
                    <img src="${image.url}" alt="${image.title}">
                    <div class="carousel-caption">
                        <h3 class="text-xl font-bold">${image.title}</h3>
                        <p class="mt-2">${image.description}</p>
                    </div>
                    <div class="progress-bar"></div>
                `;

                // Add click event for zoom
                item.addEventListener('click', () => {
                    zoomImage(image.url);
                });

                // Add cursor effects
                item.addEventListener('mouseenter', () => {
                    if (window.innerWidth >= 768) {
                        cursor.classList.add('hover');
                        cursorFollower.classList.add('hover');
                    }
                });

                item.addEventListener('mouseleave', () => {
                    if (window.innerWidth >= 768) {
                        cursor.classList.remove('hover');
                        cursorFollower.classList.remove('hover');
                    }
                });

                carouselTrack.appendChild(item);

                // Create navigation dot
                const dot = document.createElement('div');
                dot.className = 'carousel-dot';
                if (index === currentIndex) dot.classList.add('active');
                dot.addEventListener('click', () => {
                    goToSlide(index);
                });

                // Add cursor effects to dots
                dot.addEventListener('mouseenter', () => {
                    if (window.innerWidth >= 768) {
                        cursor.classList.add('hover');
                        cursorFollower.classList.add('hover');
                    }
                });

                dot.addEventListener('mouseleave', () => {
                    if (window.innerWidth >= 768) {
                        cursor.classList.remove('hover');
                        cursorFollower.classList.remove('hover');
                    }
                });

                carouselNav.appendChild(dot);
            });

            // Position slides
            updateCarousel();

            // Start auto-play if enabled
            if (isAutoPlay) {
                startAutoPlay();
            }
        }

        // Create particles
        function createParticles() {
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.width = `${Math.random() * 4 + 2}px`;
                particle.style.height = particle.style.width;
                particle.style.animationDuration = `${Math.random() * 10 + 10}s`;
                particle.style.animationDelay = `${Math.random() * 5}s`;
                particle.style.background = i % 2 === 0 ? '#ff00ff' : '#00ffff';
                particle.style.boxShadow = i % 2 === 0 ? '0 0 10px #ff00ff, 0 0 20px #ff00ff' : '0 0 10px #00ffff, 0 0 20px #00ffff';

                particlesContainer.appendChild(particle);
            }
        }

        // Update carousel based on currentIndex
        function updateCarousel() {
            const items = document.querySelectorAll('.carousel-item');
            const dots = document.querySelectorAll('.carousel-dot');

            items.forEach((item, index) => {
                item.classList.remove('active', 'prev', 'next', 'far-prev', 'far-next', 'hidden');

                if (index === currentIndex) {
                    item.classList.add('active');
                } else if (index === currentIndex - 1 || (currentIndex === 0 && index === items.length - 1)) {
                    item.classList.add('prev');
                } else if (index === currentIndex + 1 || (currentIndex === items.length - 1 && index === 0)) {
                    item.classList.add('next');
                } else if (index === currentIndex - 2 ||
                          (currentIndex === 0 && index === items.length - 2) ||
                          (currentIndex === 1 && index === items.length - 1)) {
                    item.classList.add('far-prev');
                } else if (index === currentIndex + 2 ||
                          (currentIndex === items.length - 1 && index === 1) ||
                          (currentIndex === items.length - 2 && index === 0)) {
                    item.classList.add('far-next');
                } else {
                    item.classList.add('hidden');
                }
            });

            // Update dots
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentIndex);
            });

            // Update image counter
            imageCounter.textContent = `${currentIndex + 1}/${imageData.length}`;
        }

        // Navigate to specific slide
        function goToSlide(index) {
            currentIndex = index;
            updateCarousel();
            resetAutoPlay();
        }

        // Next slide
        function nextSlide() {
            currentIndex = (currentIndex + 1) % imageData.length;
            updateCarousel();
            resetAutoPlay();
        }

        // Previous slide
        function prevSlide() {
            currentIndex = (currentIndex - 1 + imageData.length) % imageData.length;
            updateCarousel();
            resetAutoPlay();
        }

        // Zoom image
        function zoomImage(url) {
            zoomedImage.src = url;
            zoomOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Close zoom
        function closeZoomFunc() {
            zoomOverlay.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Start auto-play
        function startAutoPlay() {
            if (autoPlayInterval) clearInterval(autoPlayInterval);
            autoPlayInterval = setInterval(nextSlide, 3500);
        }

        // Stop auto-play
        function stopAutoPlay() {
            clearInterval(autoPlayInterval);
        }

        // Reset auto-play timer
        function resetAutoPlay() {
            if (isAutoPlay) {
                stopAutoPlay();
                startAutoPlay();
            }
        }

        // Toggle neon effects
        function toggleNeonEffects() {
            isNeonEnabled = !isNeonEnabled;
            document.body.classList.toggle('neon-effects', isNeonEnabled);

            if (isNeonEnabled) {
                document.querySelectorAll('.carousel-dot.active').forEach(dot => {
                    dot.style.boxShadow = '0 0 10px #ff00ff, 0 0 20px #00ffff';
                });
            } else {
                document.querySelectorAll('.carousel-dot.active').forEach(dot => {
                    dot.style.boxShadow = 'none';
                });
            }
        }

        // Event listeners
        prevBtn.addEventListener('click', prevSlide);
        nextBtn.addEventListener('click', nextSlide);
        controlPrev.addEventListener('click', prevSlide);
        controlNext.addEventListener('click', nextSlide);
        closeZoom.addEventListener('click', closeZoomFunc);

        // Add cursor effects to buttons
        const buttons = document.querySelectorAll('button');
        buttons.forEach(button => {
            button.addEventListener('mouseenter', () => {
                if (window.innerWidth >= 768) {
                    cursor.classList.add('hover');
                    cursorFollower.classList.add('hover');
                }
            });

            button.addEventListener('mouseleave', () => {
                if (window.innerWidth >= 768) {
                    cursor.classList.remove('hover');
                    cursorFollower.classList.remove('hover');
                }
            });
        });

        // Auto-play toggle
        autoPlayToggle.addEventListener('change', function() {
            isAutoPlay = this.checked;
            if (isAutoPlay) {
                startAutoPlay();
            } else {
                stopAutoPlay();
            }
        });

        // Neon effects toggle
        neonToggle.addEventListener('change', toggleNeonEffects);

        // Close zoom when clicking outside image
        zoomOverlay.addEventListener('click', (e) => {
            if (e.target === zoomOverlay) {
                closeZoomFunc();
            }
        });

        // Mouse movement for custom cursor
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth >= 768) {
                cursor.style.left = `${e.clientX}px`;
                cursor.style.top = `${e.clientY}px`;

                setTimeout(() => {
                    cursorFollower.style.left = `${e.clientX}px`;
                    cursorFollower.style.top = `${e.clientY}px`;
                }, 100);
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
            } else if (e.key === 'Escape') {
                closeZoomFunc();
            } else if (e.key === ' ') {
                e.preventDefault();
                isAutoPlay = !isAutoPlay;
                autoPlayToggle.checked = isAutoPlay;
                if (isAutoPlay) {
                    startAutoPlay();
                } else {
                    stopAutoPlay();
                }
            }
        });

        // Initialize the carousel and particles
        initCarousel();
        createParticles();
    </script>
</body>
</html>
