<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Upload Image for Recipe</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded shadow-md w-full max-w-md text-center">
    <h2 class="text-2xl font-bold mb-4">Upload Image to Generate Recipe</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul class="mb-4">
          {% for category, message in messages %}
            <li class="text-red-500">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('recipe_upload') }}" method="POST" enctype="multipart/form-data">
      <input type="file" name="image" accept="image/*"
             class="block w-full mb-4 px-4 py-2 border border-gray-300 rounded" required />

      <button type="submit"
              class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700 transition">
        Generate Recipe
      </button>
    </form>
  </div>
</body>
</html>
