<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate 3D Carousel Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .carousel-container {
            width: 100%;
            max-width: 1400px;
            height: 550px;
            perspective: 2000px;
            margin: 40px auto;
            position: relative;
        }

        .carousel-track {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        .carousel-item {
            position: absolute;
            width: 380px;
            height: 450px;
            left: 50%;
            top: 50%;
            margin-left: -190px;
            margin-top: -225px;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67),
                        z-index 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67),
                        opacity 0.8s ease;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            opacity: 0.6;
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .carousel-item:hover img {
            transform: scale(1.1);
        }

        .carousel-item.active {
            opacity: 1;
            z-index: 10;
            transform: translateZ(0) rotateY(0deg) scale(1.2);
        }

        .carousel-item.prev {
            transform: translateX(-75%) rotateY(30deg) scale(0.9);
            z-index: 3;
        }

        .carousel-item.next {
            transform: translateX(75%) rotateY(-30deg) scale(0.9);
            z-index: 3;
        }

        .carousel-item.far-prev {
            transform: translateX(-150%) rotateY(40deg) scale(0.8);
            z-index: 2;
            opacity: 0.4;
        }

        .carousel-item.far-next {
            transform: translateX(150%) rotateY(-40deg) scale(0.8);
            z-index: 2;
            opacity: 0.4;
        }

        .carousel-item.hidden {
            opacity: 0;
            z-index: 1;
        }

        .carousel-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 25px;
            transform: translateY(100%);
            transition: transform 0.5s ease;
        }

        .carousel-item.active .carousel-caption {
            transform: translateY(0);
        }

        .carousel-nav {
            display: flex;
            justify-content: center;
            margin-top: 30px;
            gap: 15px;
        }

        .carousel-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .carousel-dot.active {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            transform: scale(1.3);
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            padding: 14px 30px;
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            font-weight: 500;
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.6);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #4facfe;
            color: #4facfe;
            box-shadow: none;
        }

        .btn-outline:hover {
            background: rgba(79, 172, 254, 0.1);
        }

        .zoom-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .zoom-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .zoomed-image {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
            transform: scale(0.9);
            transition: transform 0.4s ease;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        .zoom-overlay.active .zoomed-image {
            transform: scale(1);
        }

        .close-zoom {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 30px;
            color: white;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-zoom:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        .auto-play-toggle {
            display: flex;
            align-items: center;
            margin-top: 25px;
            gap: 15px;
            padding: 15px 25px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 70px;
            height: 34px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.3);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }

        input:checked + .slider:before {
            transform: translateX(36px);
        }

        .title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            text-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }

        .subtitle {
            font-size: 1.3rem;
            margin-bottom: 40px;
            color: #cbd5e0;
            text-align: center;
            max-width: 700px;
            line-height: 1.6;
        }

        .image-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            z-index: 20;
        }

        .add-image-form {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(30, 41, 59, 0.95);
            padding: 30px;
            border-radius: 20px;
            z-index: 200;
            width: 90%;
            max-width: 500px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .add-image-form.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e0;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.7);
            color: white;
            font-size: 1rem;
        }

        @media (max-width: 1024px) {
            .carousel-container {
                height: 500px;
            }

            .carousel-item {
                width: 340px;
                height: 400px;
                margin-left: -170px;
                margin-top: -200px;
            }
        }

        @media (max-width: 768px) {
            .carousel-container {
                height: 450px;
            }

            .carousel-item {
                width: 300px;
                height: 360px;
                margin-left: -150px;
                margin-top: -180px;
            }

            .title {
                font-size: 2.8rem;
            }

            .controls {
                flex-wrap: wrap;
                justify-content: center;
            }

            .btn {
                padding: 12px 20px;
            }
        }

        @media (max-width: 640px) {
            .carousel-container {
                height: 400px;
            }

            .carousel-item {
                width: 260px;
                height: 320px;
                margin-left: -130px;
                margin-top: -160px;
            }

            .title {
                font-size: 2.3rem;
            }

            .subtitle {
                font-size: 1.1rem;
            }
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            background: rgba(30, 41, 59, 0.95);
            border-left: 4px solid #4facfe;
            border-radius: 8px;
            transform: translateX(100%);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 300;
        }

        .notification.active {
            transform: translateX(0);
            opacity: 1;
        }

        .carousel-controls {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            transform: translateY(-50%);
            z-index: 50;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .image-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 10px;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .carousel-item.active .image-info {
            opacity: 1;
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            width: 0%;
            transition: width 0.3s linear;
            z-index: 20;
        }

        .carousel-item.active .progress-bar {
            width: 100%;
            transition: width 3.5s linear;
        }
    </style>
</head>
<body>
    <h1 class="title">Ultimate 3D Carousel Gallery</h1>
    <p class="subtitle">Experience your images with stunning 3D effects, smooth animations, and intuitive controls</p>

    <div class="carousel-container glass-card">
        <div class="carousel-track" id="carouselTrack">
            <!-- Carousel items will be generated by JavaScript -->
        </div>
        <div class="image-counter" id="imageCounter">1/6</div>

        <div class="carousel-controls">
            <div class="control-btn" id="controlPrev">
                <i class="fas fa-chevron-left"></i>
            </div>
            <div class="control-btn" id="controlNext">
                <i class="fas fa-chevron-right"></i>
            </div>
        </div>
    </div>

    <div class="carousel-nav" id="carouselNav">
        <!-- Navigation dots will be generated by JavaScript -->
    </div>

    <div class="controls">
        <button class="btn" id="prevBtn">
            <i class="fas fa-chevron-left"></i> Previous
        </button>
        <button class="btn" id="nextBtn">
            Next <i class="fas fa-chevron-right"></i>
        </button>
        <button class="btn btn-outline" id="addImageBtn">
            <i class="fas fa-plus"></i> Add Image
        </button>
        <button class="btn btn-outline" id="fullscreenBtn">
            <i class="fas fa-expand"></i> Fullscreen
        </button>
    </div>

    <div class="auto-play-toggle glass-card">
        <span>Auto Play</span>
        <label class="toggle-switch">
            <input type="checkbox" id="autoPlayToggle" checked>
            <span class="slider"></span>
        </label>
        <span>Zoom on Click</span>
        <label class="toggle-switch">
            <input type="checkbox" id="zoomToggle" checked>
            <span class="slider"></span>
        </label>
    </div>

    <div class="zoom-overlay" id="zoomOverlay">
        <img class="zoomed-image" id="zoomedImage" src="" alt="Zoomed Image">
        <div class="close-zoom">
            <i class="fas fa-times"></i>
        </div>
    </div>

    <div class="add-image-form glass-card" id="addImageForm">
        <h2 class="text-2xl font-bold mb-6 text-center">Add New Image</h2>
        <div class="form-group">
            <label for="imageUrl">Image URL</label>
            <input type="text" id="imageUrl" placeholder="Paste image URL here">
        </div>
        <div class="form-group">
            <label for="imageTitle">Title</label>
            <input type="text" id="imageTitle" placeholder="Image title">
        </div>
        <div class="form-group">
            <label for="imageDesc">Description</label>
            <input type="text" id="imageDesc" placeholder="Image description">
        </div>
        <div class="flex justify-between mt-6">
            <button class="btn btn-outline" id="cancelAddBtn">Cancel</button>
            <button class="btn" id="confirmAddBtn">Add Image</button>
        </div>
    </div>

    <div class="notification" id="notification">
        Image added successfully!
    </div>

    <script>
        // Image data
        const imageData = [
            {
                url: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1170&q=80",
                title: "Mountain Landscape",
                description: "Beautiful mountain range during sunset"
            },
            {
                url: "https://images.unsplash.com/photo-1519681393784-d120267933ba?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1170&q=80",
                title: "Northern Lights",
                description: "Aurora borealis in the night sky"
            },
            {
                url: "https://images.unsplash.com/photo-1469474968028-56623f02e42e?ixlib=rb-4.0.3&id=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1174&q=80",
                title: "Nature's Beauty",
                description: "Scenic landscape with trees and lake"
            },
            {
                url: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1171&q=80",
                title: "Misty Forest",
                description: "Mysterious fog in the green forest"
            },
            {
                url: "https://images.unsplash.com/photo-1505144808419-1957a94ca61e?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1074&q=80",
                title: "River Flow",
                description: "River flowing through mountain valley"
            },
            {
                url: "https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1170&q=80",
                title: "Rocky Beach",
                description: "Sunset over a rocky beach shoreline"
            }
        ];

        // DOM elements
        const carouselTrack = document.getElementById('carouselTrack');
        const carouselNav = document.getElementById('carouselNav');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const addImageBtn = document.getElementById('addImageBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const autoPlayToggle = document.getElementById('autoPlayToggle');
        const zoomToggle = document.getElementById('zoomToggle');
        const zoomOverlay = document.getElementById('zoomOverlay');
        const zoomedImage = document.getElementById('zoomedImage');
        const closeZoom = document.querySelector('.close-zoom');
        const addImageForm = document.getElementById('addImageForm');
        const cancelAddBtn = document.getElementById('cancelAddBtn');
        const confirmAddBtn = document.getElementById('confirmAddBtn');
        const imageCounter = document.getElementById('imageCounter');
        const notification = document.getElementById('notification');
        const controlPrev = document.getElementById('controlPrev');
        const controlNext = document.getElementById('controlNext');

        // State variables
        let currentIndex = 0;
        let autoPlayInterval;
        let isAutoPlay = true;
        let isZoomEnabled = true;
        let isFullscreen = false;

        // Initialize carousel
        function initCarousel() {
            // Clear existing content
            carouselTrack.innerHTML = '';
            carouselNav.innerHTML = '';

            // Create carousel items and navigation dots
            imageData.forEach((image, index) => {
                // Create carousel item
                const item = document.createElement('div');
                item.className = 'carousel-item';
                item.innerHTML = `
                    <img src="${image.url}" alt="${image.title}">
                    <div class="carousel-caption">
                        <h3 class="text-xl font-bold">${image.title}</h3>
                        <p class="mt-2">${image.description}</p>
                    </div>
                    <div class="image-info">${index + 1} / ${imageData.length}</div>
                    <div class="progress-bar"></div>
                `;

                // Add click event for zoom
                item.addEventListener('click', () => {
                    if (isZoomEnabled) {
                        zoomImage(image.url);
                    }
                });

                carouselTrack.appendChild(item);

                // Create navigation dot
                const dot = document.createElement('div');
                dot.className = 'carousel-dot';
                if (index === currentIndex) dot.classList.add('active');
                dot.addEventListener('click', () => {
                    goToSlide(index);
                });

                carouselNav.appendChild(dot);
            });

            // Position slides
            updateCarousel();

            // Start auto-play if enabled
            if (isAutoPlay) {
                startAutoPlay();
            }
        }

        // Update carousel based on currentIndex
        function updateCarousel() {
            const items = document.querySelectorAll('.carousel-item');
            const dots = document.querySelectorAll('.carousel-dot');

            items.forEach((item, index) => {
                item.classList.remove('active', 'prev', 'next', 'far-prev', 'far-next', 'hidden');

                if (index === currentIndex) {
                    item.classList.add('active');
                } else if (index === currentIndex - 1 || (currentIndex === 0 && index === items.length - 1)) {
                    item.classList.add('prev');
                } else if (index === currentIndex + 1 || (currentIndex === items.length - 1 && index === 0)) {
                    item.classList.add('next');
                } else if (index === currentIndex - 2 ||
                          (currentIndex === 0 && index === items.length - 2) ||
                          (currentIndex === 1 && index === items.length - 1)) {
                    item.classList.add('far-prev');
                } else if (index === currentIndex + 2 ||
                          (currentIndex === items.length - 1 && index === 1) ||
                          (currentIndex === items.length - 2 && index === 0)) {
                    item.classList.add('far-next');
                } else {
                    item.classList.add('hidden');
                }
            });

            // Update dots
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentIndex);
            });

            // Update image counter
            imageCounter.textContent = `${currentIndex + 1}/${imageData.length}`;
        }

        // Navigate to specific slide
        function goToSlide(index) {
            currentIndex = index;
            updateCarousel();
            resetAutoPlay();
        }

        // Next slide
        function nextSlide() {
            currentIndex = (currentIndex + 1) % imageData.length;
            updateCarousel();
            resetAutoPlay();
        }

        // Previous slide
        function prevSlide() {
            currentIndex = (currentIndex - 1 + imageData.length) % imageData.length;
            updateCarousel();
            resetAutoPlay();
        }

        // Zoom image
        function zoomImage(url) {
            zoomedImage.src = url;
            zoomOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Close zoom
        function closeZoomFunc() {
            zoomOverlay.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Start auto-play
        function startAutoPlay() {
            if (autoPlayInterval) clearInterval(autoPlayInterval);
            autoPlayInterval = setInterval(nextSlide, 3500);
        }

        // Stop auto-play
        function stopAutoPlay() {
            clearInterval(autoPlayInterval);
        }

        // Reset auto-play timer
        function resetAutoPlay() {
            if (isAutoPlay) {
                stopAutoPlay();
                startAutoPlay();
            }
        }

        // Show add image form
        function showAddImageForm() {
            addImageForm.classList.add('active');
            document.getElementById('imageUrl').value = '';
            document.getElementById('imageTitle').value = '';
            document.getElementById('imageDesc').value = '';
        }

        // Hide add image form
        function hideAddImageForm() {
            addImageForm.classList.remove('active');
        }

        // Add new image
        function addNewImage() {
            const url = document.getElementById('imageUrl').value;
            const title = document.getElementById('imageTitle').value;
            const description = document.getElementById('imageDesc').value;

            if (!url) {
                alert('Please enter an image URL');
                return;
            }

            const newImage = {
                url: url,
                title: title || "New Image",
                description: description || "Beautiful scenery"
            };

            imageData.push(newImage);
            hideAddImageForm();
            initCarousel();

            // Show notification
            notification.textContent = "Image added successfully!";
            notification.classList.add('active');
            setTimeout(() => {
                notification.classList.remove('active');
            }, 3000);
        }

        // Toggle fullscreen
        function toggleFullscreen() {
            const carouselContainer = document.querySelector('.carousel-container');

            if (!document.fullscreenElement) {
                if (carouselContainer.requestFullscreen) {
                    carouselContainer.requestFullscreen();
                } else if (carouselContainer.webkitRequestFullscreen) {
                    carouselContainer.webkitRequestFullscreen();
                } else if (carouselContainer.msRequestFullscreen) {
                    carouselContainer.msRequestFullscreen();
                }
                isFullscreen = true;
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
                isFullscreen = false;
            }
        }

        // Event listeners
        prevBtn.addEventListener('click', prevSlide);
        nextBtn.addEventListener('click', nextSlide);
        controlPrev.addEventListener('click', prevSlide);
        controlNext.addEventListener('click', nextSlide);
        addImageBtn.addEventListener('click', showAddImageForm);
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        closeZoom.addEventListener('click', closeZoomFunc);
        cancelAddBtn.addEventListener('click', hideAddImageForm);
        confirmAddBtn.addEventListener('click', addNewImage);

        // Auto-play toggle
        autoPlayToggle.addEventListener('change', function() {
            isAutoPlay = this.checked;
            if (isAutoPlay) {
                startAutoPlay();
            } else {
                stopAutoPlay();
            }
        });

        // Zoom toggle
        zoomToggle.addEventListener('change', function() {
            isZoomEnabled = this.checked;
        });

        // Close zoom when clicking outside image
        zoomOverlay.addEventListener('click', (e) => {
            if (e.target === zoomOverlay) {
                closeZoomFunc();
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
            } else if (e.key === 'Escape') {
                closeZoomFunc();
                hideAddImageForm();
            } else if (e.key === ' ') {
                e.preventDefault();
                isAutoPlay = !isAutoPlay;
                autoPlayToggle.checked = isAutoPlay;
                if (isAutoPlay) {
                    startAutoPlay();
                } else {
                    stopAutoPlay();
                }
            } else if (e.key === 'f') {
                toggleFullscreen();
            }
        });

        // Initialize the carousel
        initCarousel();
    </script>
</body>
</html>
