<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Carousel Gallery with Zoom</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: white;
    }

    .carousel-container {
      width: 100%;
      max-width: 1200px;
      height: 500px;
      perspective: 2000px;
      margin: 40px auto;
      position: relative;
    }

    .carousel-track {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67);
    }

    .carousel-item {
      position: absolute;
      width: 350px;
      height: 400px;
      left: 50%;
      top: 50%;
      margin-left: -175px;
      margin-top: -200px;
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67),
                  z-index 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67),
                  opacity 0.8s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      opacity: 0.6;
    }

    .carousel-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .carousel-item.active {
      opacity: 1;
      z-index: 10;
      transform: translateZ(0) rotateY(0deg) scale(1.2);
    }

    .carousel-item.prev {
      transform: translateX(-75%) rotateY(30deg) scale(0.9);
      z-index: 3;
    }

    .carousel-item.next {
      transform: translateX(75%) rotateY(-30deg) scale(0.9);
      z-index: 3;
    }

    .carousel-item.far-prev {
      transform: translateX(-150%) rotateY(40deg) scale(0.8);
      z-index: 2;
      opacity: 0.4;
    }

    .carousel-item.far-next {
      transform: translateX(150%) rotateY(-40deg) scale(0.8);
      z-index: 2;
      opacity: 0.4;
    }

    .carousel-item.hidden {
      opacity: 0;
      z-index: 1;
    }

    .carousel-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      padding: 20px;
      transform: translateY(100%);
      transition: transform 0.5s ease;
    }

    .carousel-item.active .carousel-caption {
      transform: translateY(0);
    }

    .carousel-nav {
      display: flex;
      justify-content: center;
      margin-top: 30px;
      gap: 12px;
    }

    .carousel-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .carousel-dot.active {
      background: white;
      transform: scale(1.3);
    }

    .controls {
      display: flex;
      gap: 20px;
      margin-top: 30px;
    }

    .btn {
      padding: 12px 25px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      border-radius: 50px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .zoom-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s ease;
    }

    .zoom-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .zoomed-image {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      transform: scale(0.9);
      transition: transform 0.4s ease;
      border-radius: 10px;
      box-shadow: 0 5px 30px rgba(0, 0, 0, 0.5);
    }

    .zoom-overlay.active .zoomed-image {
      transform: scale(1);
    }

    .close-zoom {
      position: absolute;
      top: 30px;
      right: 30px;
      font-size: 30px;
      color: white;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .close-zoom:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: rotate(90deg);
    }

    .auto-play-toggle {
      display: flex;
      align-items: center;
      margin-top: 20px;
      gap: 10px;
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 30px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.3);
      transition: .4s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #4facfe;
    }

    input:checked + .slider:before {
      transform: translateX(30px);
    }

    .title {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }

    .subtitle {
      font-size: 1.2rem;
      margin-bottom: 40px;
      color: #cbd5e0;
      text-align: center;
      max-width: 600px;
    }

    @media (max-width: 768px) {
      .carousel-container {
        height: 400px;
      }

      .carousel-item {
        width: 280px;
        height: 320px;
        margin-left: -140px;
        margin-top: -160px;
      }

      .title {
        font-size: 2.5rem;
      }

      .controls {
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <h1 class="title">Success Story</h1>
  <p class="subtitle">Click on any image to zoom, or let the auto-play take you on a visual journey</p>

  <div class="carousel-container">
    <div class="carousel-track" id="carouselTrack">
      <!-- Carousel items will be generated by JavaScript -->
    </div>
  </div>

  <div class="carousel-nav" id="carouselNav">
    <!-- Navigation dots will be generated by JavaScript -->
  </div>

  <div class="controls">
    <button class="btn" id="prevBtn">
      <i class="fas fa-chevron-left"></i> Previous
    </button>
    <button class="btn" id="nextBtn">
      Next <i class="fas fa-chevron-right"></i>
    </button>
    <button class="btn" id="addImageBtn">
      <i class="fas fa-plus"></i> Add Image
    </button>
  </div>

  <div class="auto-play-toggle">
    <span>Auto Play: </span>
    <label class="toggle-switch">
      <input type="checkbox" id="autoPlayToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="zoom-overlay" id="zoomOverlay">
    <img class="zoomed-image" id="zoomedImage" src="" alt="Zoomed Image">
    <div class="close-zoom">
      <i class="fas fa-times"></i>
    </div>
  </div>

  <script>
    // Image data - you can add more images here
    const imageData = [
      {
        url: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1170&q=80",
        title: "Mountain Landscape",
        description: "Discover how SahaaraX helped individuals rebuild their lives with care, shelter, and counseling. These stories highlight strength, support, and second chances"
      },
      {
        url: "https://images.unsplash.com/photo-1519681393784-d120267933ba?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1170&q=80",
        title: "Northern Lights",
        description: "Discover how SahaaraX helped individuals rebuild their lives with care, shelter, and counseling. These stories highlight strength, support, and second chances"
      },
      {
        url: "https://images.unsplash.com/photo-1469474968028-56623f02e42e?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1174&q=80",
        title: "Nature's Beauty",
        description: "Scenic landscape with trees and lake"
      },
      {
        url: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1171&q=80",
        title: "Misty Forest",
        description: "Discover how SahaaraX helped individuals rebuild their lives with care, shelter, and counseling. These stories highlight strength, support, and second chances"
      },
      {
        url: "https://images.unsplash.com/photo-1505144808419-1957a94ca61e?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1074&q=80",
        title: "River Flow",
        description: "River flowing through mountain valley"
      }
    ];

    // DOM elements
    const carouselTrack = document.getElementById('carouselTrack');
    const carouselNav = document.getElementById('carouselNav');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const addImageBtn = document.getElementById('addImageBtn');
    const autoPlayToggle = document.getElementById('autoPlayToggle');
    const zoomOverlay = document.getElementById('zoomOverlay');
    const zoomedImage = document.getElementById('zoomedImage');
    const closeZoom = document.querySelector('.close-zoom');

    // State variables
    let currentIndex = 0;
    let autoPlayInterval;
    let isAutoPlay = true;

    // Initialize carousel
    function initCarousel() {
      // Clear existing content
      carouselTrack.innerHTML = '';
      carouselNav.innerHTML = '';

      // Create carousel items and navigation dots
      imageData.forEach((image, index) => {
        // Create carousel item
        const item = document.createElement('div');
        item.className = 'carousel-item';
        item.innerHTML = `
          <img src="${image.url}" alt="${image.title}">
          <div class="carousel-caption">
            <h3>${image.title}</h3>
            <p>${image.description}</p>
          </div>
        `;

        // Add click event for zoom
        item.addEventListener('click', () => {
          zoomImage(image.url);
        });

        carouselTrack.appendChild(item);

        // Create navigation dot
        const dot = document.createElement('div');
        dot.className = 'carousel-dot';
        if (index === currentIndex) dot.classList.add('active');
        dot.addEventListener('click', () => {
          goToSlide(index);
        });

        carouselNav.appendChild(dot);
      });

      // Position slides
      updateCarousel();

      // Start auto-play if enabled
      if (isAutoPlay) {
        startAutoPlay();
      }
    }

    // Update carousel based on currentIndex
    function updateCarousel() {
      const items = document.querySelectorAll('.carousel-item');
      const dots = document.querySelectorAll('.carousel-dot');

      items.forEach((item, index) => {
        item.classList.remove('active', 'prev', 'next', 'far-prev', 'far-next', 'hidden');

        if (index === currentIndex) {
          item.classList.add('active');
        } else if (index === currentIndex - 1 || (currentIndex === 0 && index === items.length - 1)) {
          item.classList.add('prev');
        } else if (index === currentIndex + 1 || (currentIndex === items.length - 1 && index === 0)) {
          item.classList.add('next');
        } else if (index === currentIndex - 2 ||
                  (currentIndex === 0 && index === items.length - 2) ||
                  (currentIndex === 1 && index === items.length - 1)) {
          item.classList.add('far-prev');
        } else if (index === currentIndex + 2 ||
                  (currentIndex === items.length - 1 && index === 1) ||
                  (currentIndex === items.length - 2 && index === 0)) {
          item.classList.add('far-next');
        } else {
          item.classList.add('hidden');
        }
      });

      // Update dots
      dots.forEach((dot, index) => {
        dot.classList.toggle('active', index === currentIndex);
      });
    }

    // Navigate to specific slide
    function goToSlide(index) {
      currentIndex = index;
      updateCarousel();
    }

    // Next slide
    function nextSlide() {
      currentIndex = (currentIndex + 1) % imageData.length;
      updateCarousel();
    }

    // Previous slide
    function prevSlide() {
      currentIndex = (currentIndex - 1 + imageData.length) % imageData.length;
      updateCarousel();
    }

    // Zoom image
    function zoomImage(url) {
      zoomedImage.src = url;
      zoomOverlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    // Close zoom
    function closeZoomFunc() {
      zoomOverlay.classList.remove('active');
      document.body.style.overflow = 'auto';
    }

    // Start auto-play
    function startAutoPlay() {
      if (autoPlayInterval) clearInterval(autoPlayInterval);
      autoPlayInterval = setInterval(nextSlide, 3000);
    }

    // Stop auto-play
    function stopAutoPlay() {
      clearInterval(autoPlayInterval);
    }

    // Add new image
    function addNewImage() {
      const newImage = {
        url: "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1174&q=80",
        title: "New Landscape",
        description: "Freshly added beautiful scene"
      };

      imageData.push(newImage);
      initCarousel();
    }

    // Event listeners
    prevBtn.addEventListener('click', prevSlide);
    nextBtn.addEventListener('click', nextSlide);
    addImageBtn.addEventListener('click', addNewImage);
    closeZoom.addEventListener('click', closeZoomFunc);

    // Auto-play toggle
    autoPlayToggle.addEventListener('change', function() {
      isAutoPlay = this.checked;
      if (isAutoPlay) {
        startAutoPlay();
      } else {
        stopAutoPlay();
      }
    });

    // Close zoom when clicking outside image
    zoomOverlay.addEventListener('click', (e) => {
      if (e.target === zoomOverlay) {
        closeZoomFunc();
      }
    });

    // Initialize the carousel
    initCarousel();
  </script>
</body>
</html>
