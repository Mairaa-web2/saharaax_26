{% extends "base_admin.html" %}
{% block title %}Emergency Aid{% endblock %}
{% block header %}Emergency Aid{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto bg-white dark:bg-gray-800 p-8 rounded-xl shadow-lg text-center">
  <h2 class="text-3xl font-extrabold text-red-600 mb-6 flex items-center justify-center gap-3">
    <i class="fas fa-exclamation-triangle"></i>
    Emergency Alert System
  </h2>

  <p class="text-gray-600 dark:text-gray-300 mb-8">
    Trigger an <strong>Emergency Aid Alert</strong> to notify all approved users via email immediately.
  </p>

  <form method="POST">
    <button type="submit"
            class="bg-red-600 hover:bg-red-700 text-white font-bold px-8 py-3 rounded-lg shadow-lg text-lg transition transform hover:scale-105">
      <i class="fas fa-bullhorn mr-2"></i> Send Emergency Alert
    </button>
  </form>
</div>

{% endblock %}
