{% extends "base.html" %}
{% block title %}Become a Volunteer{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-pink-50 via-blue-50 to-pink-100 
            dark:from-gray-900 dark:via-gray-800 dark:to-gray-900 py-12 px-6">

  <!-- Header -->
  <div class="text-center mb-12">
    <h1 class="text-4xl md:text-5xl font-extrabold text-blue-700 dark:text-white">
      <i class="fas fa-hands-helping text-pink-500"></i> Become a Volunteer
    </h1>
    <p class="mt-3 text-gray-600 dark:text-gray-300">
      Join us in making a difference 💙 Fill in your details and be part of the mission.
    </p>
  </div>

  <!-- Volunteer Form -->
  <div class="max-w-3xl mx-auto bg-white/90 dark:bg-gray-800/90 backdrop-blur-lg 
              rounded-2xl shadow-xl p-8 border-t-4 border-blue-500">
    
    <form method="POST" class="space-y-5">
      <div>
        <label class="block text-sm font-semibold">Full Name</label>
        <input type="text" name="name" required
               class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-400">
      </div>
      <div>
        <label class="block text-sm font-semibold">Email</label>
        <input type="email" name="email" required
               class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-400">
      </div>
      <div>
        <label class="block text-sm font-semibold">Phone</label>
        <input type="text" name="phone" required
               class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-400">
      </div>
      <div>
        <label class="block text-sm font-semibold">Skills</label>
        <input type="text" name="skills" placeholder="e.g., Teaching, First Aid, Event Management"
               class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-400">
      </div>
      <div>
        <label class="block text-sm font-semibold">Availability</label>
        <select name="availability" class="w-full border rounded-lg px-3 py-2">
          <option value="">-- Select --</option>
          <option value="Weekdays">Weekdays</option>
          <option value="Weekends">Weekends</option>
          <option value="Full-time">Full-time</option>
          <option value="Part-time">Part-time</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold">Message (Optional)</label>
        <textarea name="message" rows="3"
                  class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-400"></textarea>
      </div>
      <button type="submit"
              class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-3 rounded-lg 
                     font-semibold shadow-md hover:from-blue-700 hover:to-blue-800 transition">
        <i class="fas fa-paper-plane mr-2"></i> Submit Application
      </button>
    </form>
  </div>
</div>
{% endblock %}
