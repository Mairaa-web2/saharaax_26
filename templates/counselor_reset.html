{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-cover bg-center"
     style="background-image: url('{{ url_for('static', filename='confrim.jpg') }}');">


  <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-md">
    <h2 class="text-2xl font-bold text-center text-pink-600 mb-6">
      <i class="fas fa-unlock"></i> Reset Password
    </h2>
    <form method="POST" class="space-y-5">
      <div>
        <input type="password" name="password" placeholder="New Password"
               class="w-full border rounded-lg px-3 py-2" required>
      </div>
      <div>
        <input type="password" name="confirm_password" placeholder="Confirm Password"
               class="w-full border rounded-lg px-3 py-2" required>
      </div>
      <button type="submit" class="w-full bg-pink-600 text-white py-2 rounded-lg hover:bg-pink-700">
        <i class="fas fa-save"></i> Update Password
      </button>
    </form>
  </div>
</div>
{% endblock %}
