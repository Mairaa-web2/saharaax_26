<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generated Recipe</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen py-10 px-4">
  <div class="max-w-3xl mx-auto bg-white p-8 rounded shadow">
    <h1 class="text-3xl font-bold mb-6 text-center text-green-600">Your AI-Generated Recipe</h1>

    <pre class="whitespace-pre-wrap text-gray-800 text-base leading-relaxed">{{ recipe }}</pre>

    <div class="text-center mt-8">
      <a href="{{ url_for('index') }}"
         class="inline-block bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600 transition">
        Upload Another Image
      </a>
    </div>
  </div>
</body>
</html>
